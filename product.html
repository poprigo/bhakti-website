    <style>
        /* CORE VARIABLES */
        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F4F4F4;
            --text-main: #111111;
            --text-muted: #666666;
            --text-light: #999999;
            --accent: #B89768;
            --border: rgba(0, 0, 0, 0.08);
            --font-head: 'Syne', sans-serif;
            --font-body: 'Montserrat', sans-serif;
        }

        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, a, button, .menu-toggle, select { cursor: none !important; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;

        h1, h2, h3, h4, .font-head { font-family: var(--font-head); font-weight: 700; }
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        .container { max-width: 90vw; margin: 0 auto; }
        .text-accent { color: var(--accent); }

        /* CUSTOM CURSOR */
        .cursor-dot, .cursor-circle {
            position: fixed; top: 0; left: 0; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 9999;
        }
        .cursor-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
        .cursor-circle {
            width: 40px; height: 40px; border: 1px solid rgba(184, 151, 104, 0.5);
            border-radius: 50%; transition: width 0.3s, height 0.3s, background 0.3s, border-color 0.3s;
        }
        .cursor-hover { width: 70px; height: 70px; background: rgba(184, 151, 104, 0.1); border-color: transparent; }

        /* NAVIGATION */
        nav {
            position: fixed; top: 0; width: 100%; padding: 1.5rem 5vw; display: flex;
            justify-content: space-between; align-items: center; z-index: 100;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; font-family: var(--font-head); }
        .nav-links { display: flex; gap: 2.5rem; }
        .nav-links a { font-size: 0.85rem; font-weight: 500; text-transform: uppercase; position: relative; padding-bottom: 4px; }
        .nav-links a::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 0%; height: 2px;
            background: var(--accent); transition: width 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        .nav-links a.active { color: var(--accent); }
        .menu-toggle { display: none; flex-direction: column; gap: 6px; z-index: 102; padding: 10px; }
        .bar { width: 30px; height: 2px; background-color: var(--text-main); transition: 0.3s; }

        /* MOBILE MENU */
        .mobile-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: linear-gradient(135deg, var(--text-main) 0%, #1a1a1a 100%); z-index: 101;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 2rem; transform: translateY(-100%); transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .mobile-overlay::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--accent) 1.5px, transparent 1.5px); background-size: 35px 35px;
            opacity: 0.07; pointer-events: none;
        }
        .mobile-overlay.active { transform: translateY(0); }
        .menu-close {
            position: absolute; top: 2rem; right: 5vw; font-size: 2.5rem; color: var(--bg-primary);
            font-family: var(--font-body); font-weight: 300; transition: transform 0.4s ease, color 0.3s;
        }
        .menu-close:hover { transform: rotate(90deg); color: var(--accent); }
        .mobile-link-wrapper { overflow: hidden; position: relative; z-index: 2; }
        .mobile-links {
            font-family: var(--font-head); font-size: 3rem; color: var(--bg-primary); display: block;
            transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .mobile-overlay.active .mobile-links { transform: translateY(0); }
        .mobile-links:hover { color: var(--accent); }

        /* LOADER */
        #loader { display: flex; justify-content: center; align-items: center; height: 100vh; font-family: var(--font-head); font-size: 1.5rem; letter-spacing: 2px; color: var(--text-main); text-transform: uppercase; font-weight: 700; animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }

        /* PRODUCT SPLIT LAYOUT */
        .product-container { max-width: 90vw; margin: 0 auto; padding: 20vh 0 10vh 0; display: none; grid-template-columns: 1fr 1fr; gap: 5vw; }

        /* LEFT: Gallery */
        .gallery-wrapper { position: sticky; top: 120px; display: flex; flex-direction: column; gap: 1.5rem; opacity: 0; }
        .main-img-box { width: 100%; aspect-ratio: 1 / 1; background: var(--bg-secondary); border-radius: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .main-img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .thumb-row { display: flex; gap: 1rem; flex-wrap: wrap; }
        .thumb-box { width: 80px; height: 80px; background: var(--bg-secondary); border-radius: 12px; border: 2px solid transparent; transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1); overflow: hidden; aspect-ratio: 1 / 1; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.3s; }
        .thumb-box:hover img, .thumb-box.active img { opacity: 1; }
        .thumb-box.active { border-color: var(--accent); }
        .thumb-box:hover { transform: translateY(-3px); border-color: rgba(184, 151, 104, 0.5); }

        /* RIGHT: Details */
        .info-wrapper { display: flex; flex-direction: column; padding-top: 10px; opacity: 0; }
        .p-cat { color: var(--accent); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; margin-bottom: 0.5rem; display: block; }
        .p-title { font-size: clamp(1.75rem, 3.5vw, 3.2rem); line-height: 1.1; margin-bottom: 1.2rem; color: var(--text-main); letter-spacing: -1px; }
        .meta-row { display: flex; gap: 0.8rem; margin-bottom: 2.5rem; flex-wrap: wrap; }
        .meta-pill { background: var(--bg-secondary); border: 1px solid var(--border); padding: 6px 16px; border-radius: 50px; font-size: 0.75rem; color: var(--text-main); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        
        .desc-label { font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 1rem; display: block; border-bottom: 1px solid var(--border); padding-bottom: 10px; font-weight: 600; }
        .p-desc { color: var(--text-muted); font-size: 1.05rem; line-height: 1.7; margin-bottom: 3rem; white-space: pre-wrap; font-weight: 400; }

        /* Action Area */
        .action-area { margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--border); }
        .inquire-btn { display: inline-flex; align-items: center; justify-content: center; gap: 12px; background: var(--text-main); color: var(--bg-primary); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; border: none; border-radius: 50px; padding: 18px 36px; transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); width: 100%; max-width: 400px; font-family: var(--font-body); }
        .inquire-btn:hover { background: var(--accent); color: var(--bg-primary); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(184, 151, 104, 0.2); }
        .inquire-btn i { font-size: 1.2rem; }

        /* FOOTER */
        footer { padding: 4rem 0; text-align: center; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-light); }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .product-container { grid-template-columns: 1fr; gap: 2rem; padding-top: 15vh; }
            .gallery-wrapper { position: relative; top: 0; }
            .inquire-btn { max-width: 100%; }
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .menu-toggle { display: flex; }
            .cursor-dot, .cursor-circle { display: none; }
            body, a, button, .menu-toggle, .thumb-box { cursor: auto !important; }
        }
    </style>
</head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: atob("QUl6YVN5QUoxU2VCZ05falNxMXgxUU9CQmVpcUR1SVpKcTliMDUw"),
            authDomain: atob("Ymhha3RpLWRlY29yLmZpcmViYXNlYXBwLmNvbQ=="),
            projectId: atob("Ymhha3RpLWRlY29y"),
            messagingSenderId: atob("Mjg4MTU5NTA2ODgx"),
            appId: atob("MToyODgxNTk1MDY4ODE6d2ViOjg4ZDY2NDA2YzA2NGFmOWNlZWNmNDA=")
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Advanced Custom Cursor
        const dot = document.querySelector('.cursor-dot');
        const circle = document.querySelector('.cursor-circle');

        if(window.innerWidth > 768) {
            window.addEventListener('mousemove', (e) => {
                gsap.to(dot, { x: e.clientX, y: e.clientY, duration: 0 });
                gsap.to(circle, { x: e.clientX, y: e.clientY, duration: 0.15 });
            });
        }

        function attachCursorHover() {
            if(window.innerWidth > 768) {
                document.querySelectorAll('a, button, .menu-toggle, .menu-close, .thumb-box').forEach(el => {
                    el.addEventListener('mouseenter', () => circle.classList.add('cursor-hover'));
                    el.addEventListener('mouseleave', () => circle.classList.remove('cursor-hover'));
                });
            }
        }

        async function loadSingleProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                document.getElementById('loader').innerText = "Product Not Found";
                return;
            }

            try {
                const docRef = doc(db, "products", productId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    renderProductPage(data, productId);
                    injectSEO(data, productId);
                    
                    // GA4: Send eCommerce Item View Event
                    if(typeof gtag === 'function') {
                        const itemCat = data.categories ? data.categories[0] : (data.category || 'Uncategorized');
                        gtag('event', 'view_item', {
                          currency: 'USD',
                          value: data.priceExport || 0,
                          items: [
                            {
                              item_id: productId,
                              item_name: data.name,
                              item_category: itemCat
                            }
                          ]
                        });
                    }
                    
                } else {
                    document.getElementById('loader').innerText = "Product Not Found";
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loader').innerText = "Error loading product data.";
            }
        }

        function renderProductPage(p, id) {
            document.getElementById('loader').style.display = 'none';
            const container = document.getElementById('productContainer');
            container.style.display = 'grid';

            const cats = p.categories || (p.category ? [p.category] : ['Uncategorized']);
            document.getElementById('productCat').innerText = cats.join(' • ');

            document.getElementById('productTitle').innerText = p.name;
            document.getElementById('productDesc').innerText = p.description || 'Premium handcrafted paper decor engineered strictly for large-quantity imports and structural integrity across thousands of units.';

            const metaRow = document.getElementById('metaRow');
            if (p.gsm && p.gsm.trim() !== '') metaRow.innerHTML += `<span class="meta-pill">GSM: ${p.gsm}</span>`;
            if (p.hsCode && p.hsCode.trim() !== '') metaRow.innerHTML += `<span class="meta-pill">HS Code: ${p.hsCode}</span>`;
            metaRow.innerHTML += `<span class="meta-pill">Global Export Ready</span>`;

            const images = p.images && p.images.length > 0 ? p.images : ['https://images.unsplash.com/photo-1618331835717-801e976710b2?w=800&q=80'];
            const mainImg = document.getElementById('mainImage');
            mainImg.src = images[0];

            const thumbRow = document.getElementById('thumbRow');
            if (images.length > 1) {
                images.forEach((imgUrl, idx) => {
                    const thumb = document.createElement('div');
                    thumb.className = idx === 0 ? 'thumb-box active' : 'thumb-box';
                    thumb.innerHTML = `<img src="${imgUrl}">`;
                    thumb.onclick = () => {
                        mainImg.src = imgUrl;
                        document.querySelectorAll('.thumb-box').forEach(t => t.classList.remove('active'));
                        thumb.classList.add('active');
                        // GA4: Track gallery interaction
                        if(typeof gtag === 'function') { gtag('event', 'gallery_interaction', { 'item_name': p.name }); }
                    };
                    thumbRow.appendChild(thumb);
                });
            }

            const waBtn = document.getElementById('whatsappBtn');
            waBtn.onclick = () => {
                // GA4: Track Lead Generation intent
                if(typeof gtag === 'function') {
                    gtag('event', 'generate_lead', {
                        'lead_source': 'WhatsApp',
                        'item_name': p.name
                    });
                }
                
                const phone = "918238772094";
                const productUrl = window.location.href;
                const message = `Hello Bhakti Decor, I am interested in importing:\n\n*Product:* ${p.name}\n*Link:* ${productUrl}\n\nPlease share the bulk catalog and pricing.`;
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
            };

            // GSAP Entrance Animations
            gsap.fromTo('.gallery-wrapper', { autoAlpha: 0, x: -40 }, { duration: 1.2, autoAlpha: 1, x: 0, ease: "power4.out" });
            gsap.fromTo('.info-wrapper', { autoAlpha: 0, x: 40 }, { duration: 1.2, autoAlpha: 1, x: 0, ease: "power4.out", delay: 0.1 });

            attachCursorHover();
        }

        // --- DYNAMIC SEO INJECTION ---
        function injectSEO(p, id) {
            const currentUrl = window.location.href;
            const title = `${p.name} | Premium Paper Decor Manufacturer | Bhakti Decor`;
            let cleanDesc = p.description ? p.description.replace(/<[^>]*>?/gm, '').trim() : '';
            const shortDesc = cleanDesc ? cleanDesc.substring(0, 150) + '...' : `Wholesale ${p.name} engineered for global import. Request a bulk quote from Bhakti Decor today.`;
            const kw = p.seoKeywords ? p.seoKeywords.join(', ') : `${p.name}, wholesale paper decor, import event decor, paper honeycomb manufacturer`;
            const img = p.images && p.images.length > 0 ? p.images[0] : '';

            document.getElementById('seoTitle').innerText = title;
            document.getElementById('seoDesc').setAttribute('content', shortDesc);
            document.getElementById('seoKeywords').setAttribute('content', kw);
            document.getElementById('canonicalUrl').setAttribute('href', currentUrl);
            
            document.getElementById('ogTitle').setAttribute('content', title);
            document.getElementById('ogDesc').setAttribute('content', shortDesc);
            document.getElementById('ogImage').setAttribute('content', img);
            document.getElementById('ogUrl').setAttribute('content', currentUrl);
            
            document.getElementById('twitterTitle').setAttribute('content', title);
            document.getElementById('twitterDesc').setAttribute('content', shortDesc);
            document.getElementById('twitterImage').setAttribute('content', img);
            document.getElementById('twitterUrl').setAttribute('content', currentUrl);

            const schema = {
                "@context": "https://schema.org/",
                "@type": "Product",
                "name": p.name,
                "image": p.images || [img],
                "description": shortDesc,
                "sku": p.hsCode || id,
                "mpn": id,
                "brand": { "@type": "Brand", "name": "Bhakti Decor" },
                "manufacturer": { "@type": "Organization", "name": "Bhakti Decor" },
                "offers": {
                    "@type": "Offer",
                    "url": currentUrl,
                    "availability": "https://schema.org/InStock",
                    "seller": { "@type": "Organization", "name": "Bhakti Decor" },
                    "eligibleQuantity": { "@type": "QuantitativeValue", "unitCode": "C62", "minValue": "50" }
                }
            };
            const script = document.createElement('script');
            script.type = "application/ld+json";
            script.text = JSON.stringify(schema);
            document.head.appendChild(script);
        }

        window.toggleMenu = function () {
            document.getElementById('mobileOverlay').classList.toggle('active');
            document.body.style.overflow = document.body.style.overflow === 'hidden' ? 'auto' : 'hidden';
        };

        // --- GA4 EVENT DELEGATION (Nav & Scroll) ---
        document.addEventListener('click', (e) => {
            if(e.target.closest('nav .nav-links a') || e.target.closest('.mobile-overlay a')) {
                const link = e.target.closest('a');
                if(typeof gtag === 'function') {
                    gtag('event', 'navigation_click', { 'menu_item': link.innerText });
                }
            }
        });

        // Lenis Smooth Scroll & Advanced GA4 Scroll Tracking
        const lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)) });
        
        let maxScrollMilestone = 0;
        lenis.on('scroll', (e) => {
            if(e.dimensions.maxScroll === 0) return; 
            const scrollPercent = Math.round((e.animatedScroll / e.dimensions.maxScroll) * 100);
            if (scrollPercent > 24 && maxScrollMilestone < 25) { triggerScrollEvent(25); }
            else if (scrollPercent > 49 && maxScrollMilestone < 50) { triggerScrollEvent(50); }
            else if (scrollPercent > 74 && maxScrollMilestone < 75) { triggerScrollEvent(75); }
            else if (scrollPercent > 98 && maxScrollMilestone < 100) { triggerScrollEvent(100); }
        });

        function triggerScrollEvent(depth) {
            maxScrollMilestone = depth;
            if(typeof gtag === 'function') {
                gtag('event', 'scroll_depth_reached', { 'depth_percentage': depth });
            }
        }

        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        document.addEventListener('DOMContentLoaded', loadSingleProduct);
    </script>
</body>

</html>
